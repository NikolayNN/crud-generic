spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Spring Boot 2.5+ runs data.sql via SqlDataSourceScriptDatabaseInitializer before
# Hibernate creates the schema, so unconditional INSERTs against tables only
# Hibernate knows about would fail with "Table not found". Defer data.sql until
# after JPA has created the schema.
spring.jpa.defer-datasource-initialization=true

spring.h2.console.enabled=true

spring.h2.console.path=/h2-console
spring.h2.console.settings.trace=false
spring.h2.console.settings.web-allow-others=false

spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
